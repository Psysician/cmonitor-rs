name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install oracle Python dependencies
        run: pip install pydantic pydantic-settings rich numpy pytz pyyaml

      - name: Verify oracle bundle imports
        run: PYTHONPATH=tests/vendor/claude-code-usage-monitor/src python3 -c "import claude_monitor.cli.main"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify
        run: make verify

